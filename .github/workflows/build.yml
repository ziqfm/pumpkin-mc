name: Nightly Pumpkin Build for Pi 5

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Checkout upstream Pumpkin code
        run: |
          git clone --depth 1 https://github.com/Pumpkin-MC/Pumpkin.git pumpkin-src
          cp Dockerfile.pi5 pumpkin-src/Dockerfile.pi5

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./pumpkin-src
          file: ./pumpkin-src/Dockerfile.pi5
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pumpkin-mc:latest