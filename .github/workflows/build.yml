name: Nightly Pumpkin Build for Pi 5

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm
    permissions:
      packages: write
      contents: read

    steps:
      # 1. Checkout YOUR repository to get Dockerfile.pi5
      - name: Checkout your repository
        uses: actions/checkout@v4

      # 2. Clone the upstream Pumpkin code into a subfolder
      - name: Checkout upstream Pumpkin code
        run: |
          git clone --depth 1 https://github.com/Pumpkin-MC/Pumpkin.git pumpkin-src
          
          # Move your custom Dockerfile into the source folder
          cp Dockerfile.pi5 pumpkin-src/Dockerfile.pi5

      # 3. Log in to GHCR
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Setup Buildx (Required for multi-stage exporting)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Build and Push directly from the pumpkin-src folder
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./pumpkin-src
          file: ./pumpkin-src/Dockerfile.pi5
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pumpkin:latest