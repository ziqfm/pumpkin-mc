name: Nightly Pumpkin Build for Pi 5

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      # 1. Checkout the latest Pumpkin code
      - name: Checkout upstream code
        run: |
          git clone --depth 1 https://github.com/Pumpkin-MC/Pumpkin.git .

      # 2. Log in to GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Setup emulation (required for packaging arm64 binaries/libs)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 4. Setup Buildx (enables the --platform flag)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Build and Push
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          # We'll put the Dockerfile in the root of the repo during the run, 
          # or you can commit it as 'Dockerfile'
          file: Dockerfile
          platforms: linux/arm64
          push: true
          build-args: |
            TARGET_CPU=cortex-a76
          tags: |
            ghcr.io/${{ github.repository_owner }}/pumpkin-mc:latest
